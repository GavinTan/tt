name: GitHub Actions Build and Deploy Demo
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@master


    - name: Deploy
      uses: gavintan/tt@master
      env:
        ACCESS_TOKEN: ${{ secrets.token }}
        BRANCH: master
        FOLDER: build
        BUILD_SCRIPT: npm install && npm run build
