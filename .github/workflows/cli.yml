name: GitHub Actions Build and Deploy Demo
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@master
     
    - name: Build
      run: |
        npm install
        npm run build

    - name: Deploy
      uses: gavintan/tt@master
      with:
        branch: gh-pages
        folder: build
